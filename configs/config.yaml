# ============================================================
# DeepFake Detection System — Global Config
# ============================================================

project:
  name: deepfake-detection
  version: "1.0.0"
  seed: 42

paths:
  data_raw: data/raw
  data_processed: data/processed
  splits: data/splits
  checkpoints: checkpoints
  logs: logs

# ── Preprocessing ──────────────────────────────────────────
preprocessing:
  frame_sample_rate: 10          # extract every Nth frame
  max_frames_per_video: 30       # cap frames per video
  face_image_size: 224           # final face crop size
  face_margin: 0.3               # padding around detected face
  min_face_size: 60              # skip tiny detections
  mtcnn_batch_size: 32

# ── Dataset ────────────────────────────────────────────────
dataset:
  name: celeb-df                 # celeb-df | ff++ | dfdc | combined
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

# ── Training ───────────────────────────────────────────────
training:
  model: cnn_lstm                # efficientnet | cnn_lstm
  epochs: 10
  batch_size: 2
  num_workers: 2
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  lr_scheduler: cosine           # cosine | step | plateau
  warmup_epochs: 2
  early_stopping_patience: 7
  grad_clip: 1.0
  mixed_precision: false          # use torch.cuda.amp

  # CNN-LSTM specific
  sequence_length: 5            # frames per video clip
  lstm_hidden_size: 256
  lstm_num_layers: 2
  lstm_dropout: 0.5

# ── Augmentation ───────────────────────────────────────────
augmentation:
  train:
    horizontal_flip: 0.5
    rotation_degrees: 10
    brightness_jitter: 0.2
    contrast_jitter: 0.2
    saturation_jitter: 0.1
    gaussian_blur_prob: 0.1
    jpeg_compression_prob: 0.2
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
  val:
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

# ── Evaluation ─────────────────────────────────────────────
evaluation:
  threshold: 0.5
  metrics: [accuracy, precision, recall, f1, roc_auc]

# ── Inference ──────────────────────────────────────────────
inference:
  model_path: checkpoints/best_model.pth
  device: cpu                   # auto | cpu | cuda
  batch_size: 16
  aggregation: mean              # mean | max | weighted

# ── API ────────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8000
  max_upload_size_mb: 500
  allowed_extensions: [mp4, avi, mov, mkv, jpg, jpeg, png]
